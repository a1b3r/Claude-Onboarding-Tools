name: checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  links-and-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        run: python3 scripts/check_links.py
      - name: Check guide structure
        run: python3 scripts/check_guide.py
